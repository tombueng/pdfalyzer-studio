name: Code Quality

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  security-events: write

jobs:
  spotbugs:
    name: SpotBugs + FindSecBugs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: oracle
          cache: maven

      - name: Compile
        run: mvn -B -DskipTests --no-transfer-progress compile

      - name: Run SpotBugs (High severity gate)
        run: |
          mvn -B --no-transfer-progress \
            com.github.spotbugs:spotbugs-maven-plugin:4.9.7.0:spotbugs \
            com.github.spotbugs:spotbugs-maven-plugin:4.9.7.0:check \
            -Dspotbugs.threshold=High \
            -Dspotbugs.failOnError=true

      - name: Upload SpotBugs report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: spotbugs-report
          path: |
            target/spotbugsXml.xml
            target/spotbugs.html
          retention-days: 30
          if-no-files-found: ignore
