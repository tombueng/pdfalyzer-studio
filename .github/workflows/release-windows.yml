name: Release Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows-installer:
    name: Build MSI + Portable EXE
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: oracle
          cache: maven

      - name: Cache installer bundle (JRE + Chromium + Launch4j + WiX)
        id: cache-bundle
        uses: actions/cache@v4
        with:
          path: installer/windows/bundle
          key: installer-bundle-${{ hashFiles('installer/windows/update-components.ps1') }}

      - name: Download installer components & build app JAR
        shell: pwsh
        working-directory: installer/windows
        run: |
          if ('${{ steps.cache-bundle.outputs.cache-hit }}' -eq 'true') {
            ./update-components.ps1 -SkipDownloads
          } else {
            ./update-components.ps1
          }

      - name: Build MSI installer
        shell: cmd
        working-directory: installer/windows
        run: build-installer.bat

      - name: Download Warp packer
        shell: pwsh
        run: |
          $url = 'https://github.com/dgiagio/warp/releases/download/v0.3.0/windows-x64.warp-packer.exe'
          Invoke-WebRequest -Uri $url -OutFile warp-packer.exe

      - name: Build portable single-file EXE with Warp
        shell: pwsh
        run: |
          $stage = 'installer/windows/portable-stage'
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item -Recurse installer/windows/bundle/app       "$stage/app"
          Copy-Item -Recurse installer/windows/bundle/jre       "$stage/jre"
          Copy-Item -Recurse installer/windows/bundle/chromium  "$stage/chromium"
          Copy-Item        installer/windows/bundle/pdfalyzer.bat "$stage/pdfalyzer.bat"
          ./warp-packer.exe --arch windows-x64 --input_dir $stage --exec pdfalyzer.bat --output installer/windows/output/PdfalyzerStudio-portable.exe

      - name: Upload artifacts (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: pdfalyzer-windows-installer
          path: |
            installer/windows/output/PdfalyzerStudioInstaller.msi
            installer/windows/output/PdfalyzerStudio-portable.exe
          retention-days: 30

      - name: Attach to GitHub Release (tag push only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            installer/windows/output/PdfalyzerStudioInstaller.msi
            installer/windows/output/PdfalyzerStudio-portable.exe
          generate_release_notes: true
