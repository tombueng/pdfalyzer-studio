name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  checks: write
  pull-requests: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: oracle
          cache: maven

      - name: Set up Chrome for Selenium e2e tests
        uses: browser-actions/setup-chrome@v2
        id: setup-chrome
        with:
          chrome-version: stable

      - name: Build, Test & Coverage
        timeout-minutes: 20
        run: mvn clean verify --batch-mode --no-transfer-progress -Djs.coverage=true -Dchrome.binary=${{ steps.setup-chrome.outputs.chrome-path }}

      - name: Ensure JaCoCo XML report exists (even if tests failed)
        if: always()
        run: mvn jacoco:report --batch-mode --no-transfer-progress

      - name: Set up Node for JS coverage report
        if: always()
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Convert V8 coverage to LCOV
        if: always()
        run: |
          if [ -d target/js-coverage/raw ]; then
            npm i --no-save monocart-coverage-reports
            node tools/jscov-report.cjs || echo "JS coverage report skipped"
          else
            echo "No raw V8 coverage to convert"
          fi

      - name: Upload coverage to Codecov (Java)
        if: always()
        uses: codecov/codecov-action@v6
        with:
          files: ./target/site/jacoco/jacoco.xml
          flags: backend
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage to Codecov (Frontend)
        if: always()
        uses: codecov/codecov-action@v6
        with:
          files: ./target/js-coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload JaCoCo HTML report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 30

      - name: Upload JS coverage HTML report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: js-coverage-report
          path: target/js-coverage/report/
          retention-days: 30
          if-no-files-found: ignore

      - name: Test Report
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Test Results
          path: target/surefire-reports/*.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload Test Reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 30

      - name: Upload JAR
        uses: actions/upload-artifact@v7
        if: success()
        with:
          name: pdfalyzer-studio-jar
          path: target/pdfalyzer-studio-*.jar
          retention-days: 30

  publish-maven:
    name: Publish Maven Package
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: oracle
          cache: maven

      - name: Publish to GitHub Packages
        run: mvn deploy -DskipTests --batch-mode --no-transfer-progress
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-docker:
    name: Build & Push Docker Image
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
