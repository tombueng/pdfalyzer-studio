name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Build & Test
        run: mvn clean verify --batch-mode --no-transfer-progress

      - name: Test Report
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: Test Results
          path: target/surefire-reports/*.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload Test Reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 30

      - name: Upload JAR
        uses: actions/upload-artifact@v7
        if: success()
        with:
          name: pdfalyzer-studio-jar
          path: target/pdfalyzer-ui-*.jar
          retention-days: 30
