version: 2

updates:
  # Maven dependencies
  - package-ecosystem: maven
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 20
    ignore:
      # veraPDF artifacts don't release in lockstep — parser often
      # skips versions, breaking the shared version property. Update manually.
      - dependency-name: "org.verapdf*"
    groups:
      spring-boot:
        patterns:
          - "org.springframework.boot*"
          - "org.springframework*"
      pdfbox:
        patterns:
          - "org.apache.pdfbox*"
      testing:
        patterns:
          - "org.junit*"
          - "org.mockito*"
          - "org.seleniumhq*"
          - "io.github.bonigarcia*"
      minor-and-patch:
        update-types:
          - minor
          - patch
        exclude-patterns:
          - "org.springframework.boot*"
          - "org.springframework*"
          - "org.apache.pdfbox*"
          - "org.verapdf*"

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      actions:
        patterns:
          - "*"
