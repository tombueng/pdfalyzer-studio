<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<nav class="navbar navbar-expand-lg" th:fragment="navbar">
    <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center" href="#">
            <img src="/icon.svg" alt="logo" width="28" height="28" class="me-2" />
            <span class="d-none d-md-inline">PDFalyzer Studio</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent" aria-controls="navbarContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <!-- File input lives outside the collapse; triggered programmatically by #uploadBtn click -->
        <input type="file" id="fileInput" accept=".pdf" hidden />
        <div class="collapse navbar-collapse" id="navbarContent">

            <!-- Desktop: Edit Form — left-aligned (hidden on mobile) -->
            <div class="d-none d-lg-flex align-items-center gap-1">

                <!-- Edit Form toggle -->
                <button class="btn btn-outline-accent btn-sm" id="editFormToggleBtn" title="Toggle form editing mode">
                    <i class="fas fa-edit me-1"></i>Edit Form
                </button>

                <!-- Edit field controls — visible only when Edit Form is active -->
                <div id="editFieldControls" class="d-none align-items-center gap-1">
                    <div class="vr mx-1"></div>
                    <button class="edit-field-btn" data-type="select" title="Rectangle select fields — drag to select, Ctrl+drag to add (S)"><i class="fas fa-object-group"></i></button>
                    <div class="vr mx-1"></div>
                    <span class="text-muted me-1" style="font-size:12px;">Add:</span>
                    <button class="edit-field-btn" data-type="text"><i class="fas fa-keyboard me-1"></i>Text</button>
                    <button class="edit-field-btn" data-type="checkbox"><i class="fas fa-check-square me-1"></i>Checkbox</button>
                    <button class="edit-field-btn" data-type="combo"><i class="fas fa-list me-1"></i>Combo</button>
                    <button class="edit-field-btn" data-type="list"><i class="fas fa-th-list me-1"></i>List</button>
                    <button class="edit-field-btn" data-type="radio"><i class="fas fa-dot-circle me-1"></i>Radio</button>
                    <button class="edit-field-btn" data-type="signature"><i class="fas fa-signature me-1"></i>Signature</button>
                    <button class="btn btn-outline-accent btn-sm" id="formOptionsBtn" disabled title="Edit options for selected field(s)">
                        <i class="fas fa-sliders-h me-1"></i>Options
                    </button>
                    <div class="vr mx-1"></div>
                    <button class="btn btn-outline-accent btn-sm" id="snapGridBtn" title="Toggle snap to grid (G)">
                        <i class="fas fa-th"></i>
                    </button>
                    <button class="btn btn-outline-accent btn-sm" id="copyFieldsBtn" disabled title="Copy selected fields (Ctrl+C)">
                        <i class="fas fa-copy"></i>
                    </button>
                    <button class="btn btn-outline-accent btn-sm" id="pasteFieldsBtn" disabled title="Paste fields (Ctrl+V)">
                        <i class="fas fa-paste"></i>
                    </button>
                    <div class="dropdown">
                        <button class="btn btn-outline-accent btn-sm dropdown-toggle" id="alignDropdownBtn" disabled data-bs-toggle="dropdown" aria-expanded="false" title="Align / distribute selected fields (2+ required)">
                            <i class="fas fa-align-left"></i>
                        </button>
                        <ul class="dropdown-menu" aria-labelledby="alignDropdownBtn">
                            <li><button class="dropdown-item" id="alignLeftBtn"><i class="fas fa-align-left me-2"></i>Align Left</button></li>
                            <li><button class="dropdown-item" id="alignRightBtn"><i class="fas fa-align-right me-2"></i>Align Right</button></li>
                            <li><button class="dropdown-item" id="alignTopBtn"><i class="fas fa-arrow-up me-2"></i>Align Top</button></li>
                            <li><button class="dropdown-item" id="alignBottomBtn"><i class="fas fa-arrow-down me-2"></i>Align Bottom</button></li>
                            <li><button class="dropdown-item" id="centerHBtn"><i class="fas fa-arrows-alt-h me-2"></i>Center Horizontally</button></li>
                            <li><button class="dropdown-item" id="centerVBtn"><i class="fas fa-arrows-alt-v me-2"></i>Center Vertically</button></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><button class="dropdown-item" id="distributeHBtn"><i class="fas fa-grip-lines-vertical me-2"></i>Distribute Horizontally</button></li>
                            <li><button class="dropdown-item" id="distributeVBtn"><i class="fas fa-grip-lines me-2"></i>Distribute Vertically</button></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><button class="dropdown-item" id="matchWidthBtn"><i class="fas fa-arrows-alt-h me-2"></i>Match Width</button></li>
                            <li><button class="dropdown-item" id="matchHeightBtn"><i class="fas fa-arrows-alt-v me-2"></i>Match Height</button></li>
                            <li><button class="dropdown-item" id="matchSizeBtn"><i class="fas fa-expand-arrows-alt me-2"></i>Match Size</button></li>
                        </ul>
                    </div>
                </div>

            </div>

            <!-- Desktop: view / file actions — right-aligned (hidden on mobile) -->
            <div class="d-none d-lg-flex align-items-center gap-2 ms-auto">

                <div class="dropdown">
                    <button class="btn btn-outline-accent btn-sm dropdown-toggle" id="samplesDropdownBtn" title="Load a sample PDF" data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="fas fa-folder-open me-1"></i>Samples
                    </button>
                    <ul class="dropdown-menu" id="samplesDropdownMenu" aria-labelledby="samplesDropdownBtn">
                        <li><span class="dropdown-item text-muted small">Loading…</span></li>
                    </ul>
                </div>
                <button class="btn btn-outline-accent btn-sm" id="exportTreeBtn" disabled title="Export tree as JSON">
                    <i class="fas fa-file-export"></i>
                </button>
                <div class="vr"></div>
                <button class="btn btn-outline-accent btn-sm" id="zoomModeBtn" disabled title="Toggle auto zoom mode">
                    <i class="fas fa-expand-arrows-alt"></i>
                </button>
                <button class="btn btn-outline-accent btn-sm" id="zoomOutBtn" disabled title="Zoom out">
                    <i class="fas fa-search-minus"></i>
                </button>
                <button class="btn btn-outline-accent btn-sm" id="zoomInBtn" disabled title="Zoom in">
                    <i class="fas fa-search-plus"></i>
                </button>
                <button class="btn btn-outline-accent btn-sm" id="panModeBtn" disabled title="Pan view (hand tool)">
                    <i class="fas fa-hand-paper"></i>
                </button>
                <button class="btn btn-outline-accent btn-sm" id="annotationLayerBtn" disabled title="Toggle pdf.js annotation layer">
                    <i class="fas fa-layer-group"></i>
                </button>
                <div class="vr"></div>
                <button type="button" class="btn btn-accent btn-sm mb-0" id="uploadBtn">
                    <i class="fas fa-upload me-1"></i>Upload PDF
                </button>
                <button class="btn btn-outline-accent btn-sm" id="formSaveBtn" disabled title="Save pending changes">
                    <i class="fas fa-save me-1"></i>Save
                    <span id="formSaveFailedBadge" class="badge text-bg-danger ms-1 d-none" title="Failed pending COS changes">0</span>
                </button>
                <button class="btn btn-outline-accent btn-sm" id="downloadBtn" disabled title="Download PDF (Ctrl+S)">
                    <i class="fas fa-download me-1"></i>Download
                </button>

            </div>

            <!-- Mobile: full-text nav menu grouped by category (hidden on desktop) -->
            <nav class="d-lg-none navbar-mobile-nav">
                <div class="navbar-mobile-section">
                    <div class="navbar-mobile-header"><i class="fas fa-file me-2"></i>File</div>
                    <button type="button" class="navbar-mobile-item mobile-upload-btn">
                        <i class="fas fa-upload me-2"></i>Upload PDF
                    </button>
                    <div class="dropdown">
                        <button class="navbar-mobile-item dropdown-toggle w-100 text-start" id="mobileSamplesBtn" data-bs-toggle="dropdown" aria-expanded="false">
                            <i class="fas fa-folder-open me-2"></i>Load Sample
                        </button>
                        <ul class="dropdown-menu" id="mobileSamplesMenu" aria-labelledby="mobileSamplesBtn">
                            <li><span class="dropdown-item text-muted small">Loading…</span></li>
                        </ul>
                    </div>
                    <button class="navbar-mobile-item" onclick="document.getElementById('formSaveBtn').click()">
                        <i class="fas fa-save me-2"></i>Save
                    </button>
                    <button class="navbar-mobile-item" onclick="document.getElementById('downloadBtn').click()">
                        <i class="fas fa-download me-2"></i>Download PDF
                    </button>
                    <button class="navbar-mobile-item" onclick="document.getElementById('exportTreeBtn').click()">
                        <i class="fas fa-file-export me-2"></i>Export Tree as JSON
                    </button>
                </div>
                <hr class="navbar-mobile-divider" />
                <div class="navbar-mobile-section">
                    <div class="navbar-mobile-header"><i class="fas fa-eye me-2"></i>View</div>
                    <button class="navbar-mobile-item" onclick="document.getElementById('zoomModeBtn').click()">
                        <i class="fas fa-expand-arrows-alt me-2"></i>Toggle Auto Zoom
                    </button>
                    <button class="navbar-mobile-item" onclick="document.getElementById('zoomOutBtn').click()">
                        <i class="fas fa-search-minus me-2"></i>Zoom Out
                    </button>
                    <button class="navbar-mobile-item" onclick="document.getElementById('zoomInBtn').click()">
                        <i class="fas fa-search-plus me-2"></i>Zoom In
                    </button>
                    <button class="navbar-mobile-item" onclick="document.getElementById('panModeBtn').click()">
                        <i class="fas fa-hand-paper me-2"></i>Pan View
                    </button>
                    <button class="navbar-mobile-item" onclick="document.getElementById('annotationLayerBtn').click()">
                        <i class="fas fa-layer-group me-2"></i>Toggle Annotation Layer
                    </button>
                </div>
                <hr class="navbar-mobile-divider" />
                <div class="navbar-mobile-section">
                    <div class="navbar-mobile-header"><i class="fas fa-edit me-2"></i>Form Edit</div>
                    <button class="navbar-mobile-item" onclick="document.getElementById('editFormToggleBtn').click()">
                        <i class="fas fa-edit me-2"></i>Toggle Edit Form
                    </button>
                    <button class="navbar-mobile-item edit-field-btn" data-type="select">
                        <i class="fas fa-object-group me-2"></i>Rectangle Select
                    </button>
                    <button class="navbar-mobile-item edit-field-btn" data-type="text">
                        <i class="fas fa-keyboard me-2"></i>Add Text Field
                    </button>
                    <button class="navbar-mobile-item edit-field-btn" data-type="checkbox">
                        <i class="fas fa-check-square me-2"></i>Add Checkbox
                    </button>
                    <button class="navbar-mobile-item edit-field-btn" data-type="combo">
                        <i class="fas fa-list me-2"></i>Add Combo Box
                    </button>
                    <button class="navbar-mobile-item edit-field-btn" data-type="list">
                        <i class="fas fa-th-list me-2"></i>Add List Box
                    </button>
                    <button class="navbar-mobile-item edit-field-btn" data-type="radio">
                        <i class="fas fa-dot-circle me-2"></i>Add Radio Button
                    </button>
                    <button class="navbar-mobile-item edit-field-btn" data-type="signature">
                        <i class="fas fa-signature me-2"></i>Add Signature Field
                    </button>
                    <button class="navbar-mobile-item" onclick="document.getElementById('formOptionsBtn').click()">
                        <i class="fas fa-sliders-h me-2"></i>Field Options
                    </button>
                    <button class="navbar-mobile-item" onclick="document.getElementById('snapGridBtn').click()">
                        <i class="fas fa-th me-2"></i>Toggle Snap to Grid
                    </button>
                    <button class="navbar-mobile-item" onclick="document.getElementById('copyFieldsBtn').click()">
                        <i class="fas fa-copy me-2"></i>Copy Selected Fields
                    </button>
                    <button class="navbar-mobile-item" onclick="document.getElementById('pasteFieldsBtn').click()">
                        <i class="fas fa-paste me-2"></i>Paste Fields
                    </button>
                    <button class="navbar-mobile-item" onclick="document.getElementById('alignLeftBtn').click()">
                        <i class="fas fa-align-left me-2"></i>Align Left
                    </button>
                </div>
            </nav>

        </div>
    </div>
</nav>
</body>
</html>
