<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="modals">

    <!-- Resource preview modal -->
    <div class="modal fade pdfa-modal" id="resourcePreviewModal" tabindex="-1" aria-labelledby="resourcePreviewLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="resourcePreviewLabel"><i class="fas fa-image me-2"></i><span id="resourcePreviewLabelText">Resource Preview</span></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="resourcePreviewBody">
                    <!-- injected content -->
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-accent btn-sm" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Unified field create/edit modal (populated dynamically by app-field-dialog.js) -->
    <div class="modal fade" id="fieldEditModal" tabindex="-1" aria-labelledby="fieldEditModalTitle" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered field-config-modal" style="max-width:700px;">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="fieldEditModalTitle"><i class="fas fa-square-plus me-2"></i>Field</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <!-- Context info (edit mode: "Editing: fieldName" / scope hint) -->
                    <div id="fdContextInfo" class="field-options-meta field-options-meta-secondary mb-2 d-none"></div>
                    <!-- Identity row — shown in create mode only -->
                    <div class="row g-2 mb-2" id="fdIdentityRow">
                        <div class="col-6">
                            <label class="form-label form-label-sm"><i class="fas fa-tag me-1"></i>Type</label>
                            <input class="form-control form-control-sm" id="fdFieldType" readonly />
                        </div>
                        <div class="col-6">
                            <label class="form-label form-label-sm"><i class="fas fa-file me-1"></i>Page</label>
                            <input class="form-control form-control-sm" id="fdFieldPage" readonly />
                        </div>
                        <div class="col-12">
                            <label class="form-label form-label-sm"><i class="fas fa-fingerprint me-1"></i>Field ID</label>
                            <input class="form-control form-control-sm" id="fdFieldId" placeholder="field_id" />
                        </div>
                    </div>
                    <!-- Tabs and tab content injected here by app-field-dialog.js -->
                    <div id="fdTabsContainer"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-accent btn-sm" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-accent btn-sm" id="fieldEditModalApplyBtn">Apply</button>
                </div>
            </div>
        </div>
    </div>

    <!-- PDF password modal -->
    <div class="modal fade" id="pdfPasswordModal" tabindex="-1" aria-labelledby="pdfPasswordLabel" aria-hidden="true" data-bs-backdrop="static" data-bs-keyboard="false">
        <div class="modal-dialog modal-dialog-centered" style="max-width:420px;">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="pdfPasswordLabel">
                        <i class="fas fa-lock me-2 text-warning"></i>Password Required
                    </h5>
                </div>
                <div class="modal-body">
                    <p class="mb-2" style="font-size:13px;" id="pdfPasswordHint">
                        This PDF is encrypted. Enter the password to open it.
                    </p>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-key"></i></span>
                        <input type="password" class="form-control form-control-sm" id="pdfPasswordInput"
                               placeholder="Password" autocomplete="current-password"
                               style="color:#e0e0e0; font-size:0.875rem;" />
                        <button class="btn btn-outline-secondary btn-sm" type="button" id="pdfPasswordToggle"
                                title="Show/hide password">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="mt-2 text-danger" id="pdfPasswordError" style="font-size:12px;display:none;"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary btn-sm" id="pdfPasswordCancelBtn">Cancel</button>
                    <button type="button" class="btn btn-accent btn-sm" id="pdfPasswordSubmitBtn">
                        <i class="fas fa-unlock me-1"></i>Unlock
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Export protection modal -->
    <div class="modal fade" id="pdfExportProtectionModal" tabindex="-1" aria-labelledby="exportProtLabel" aria-hidden="true" data-bs-backdrop="static" data-bs-keyboard="false">
        <div class="modal-dialog modal-dialog-centered" style="max-width:480px;">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="exportProtLabel">
                        <i class="fas fa-shield-alt me-2 text-warning"></i>Export Protection
                    </h5>
                </div>
                <div class="modal-body">
                    <p class="mb-3" style="font-size:13px;" id="exportProtDesc"></p>
                    <!-- Protection mode radio group -->
                    <div class="mb-1">
                        <div class="form-check mb-1">
                            <input class="form-check-input" type="radio" name="exportProtMode" id="exportProtKeep" value="keep" checked>
                            <label class="form-check-label" for="exportProtKeep" style="font-size:13px;">
                                Keep original protection <span class="text-muted">(recommended)</span>
                            </label>
                        </div>
                        <div class="form-check mb-1">
                            <input class="form-check-input" type="radio" name="exportProtMode" id="exportProtCustom" value="custom">
                            <label class="form-check-label" for="exportProtCustom" style="font-size:13px;">
                                Use different protection settings
                            </label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="exportProtMode" id="exportProtNone" value="none">
                            <label class="form-check-label" for="exportProtNone" style="font-size:13px;">
                                Export without any protection
                            </label>
                        </div>
                    </div>
                    <!-- Custom settings (shown only when "custom" is selected) -->
                    <div id="exportProtCustomSettings" style="display:none;">
                        <hr class="my-2">
                        <div class="mb-2">
                            <label class="form-label mb-1" style="font-size:12px;">
                                User Password <small class="text-muted">— required to open the PDF</small>
                            </label>
                            <div class="input-group input-group-sm">
                                <input type="password" class="form-control form-control-sm" id="exportProtUserPw"
                                       placeholder="Leave empty = no open password" autocomplete="off">
                                <button class="btn btn-outline-secondary btn-sm" type="button" id="exportProtUserPwToggle" title="Show/hide">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>
                        <div class="mb-2">
                            <label class="form-label mb-1" style="font-size:12px;">
                                Owner Password <small class="text-muted">— required to change permissions</small>
                            </label>
                            <div class="input-group input-group-sm">
                                <input type="password" class="form-control form-control-sm" id="exportProtOwnerPw"
                                       placeholder="Leave empty = same as user password" autocomplete="off">
                                <button class="btn btn-outline-secondary btn-sm" type="button" id="exportProtOwnerPwToggle" title="Show/hide">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>
                        <div class="mb-1">
                            <label class="form-label mb-1" style="font-size:12px;">Encryption Algorithm</label>
                            <select class="form-select form-select-sm" id="exportProtAlgorithm">
                                <option value="AES-256">AES-256 (strongest, recommended)</option>
                                <option value="AES-128">AES-128</option>
                                <option value="RC4-128">RC4-128 (legacy)</option>
                                <option value="RC4-40">RC4-40 (weakest, legacy)</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary btn-sm" id="exportProtCancelBtn">Cancel</button>
                    <button type="button" class="btn btn-accent btn-sm" id="exportProtDownloadBtn">
                        <i class="fas fa-download me-1"></i>Download
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Signing wizard modal (content injected by app-signing.js) -->
    <div class="modal fade pdfa-modal" id="signingWizardModal" tabindex="-1" aria-labelledby="signingWizardTitle" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered" style="max-width:720px;">
            <!-- injected by app-signing.js -->
        </div>
    </div>

</th:block>
</body>
</html>
