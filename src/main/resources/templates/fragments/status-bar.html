<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div id="statusBar" th:fragment="status-bar">
    <span class="status-item" id="statusFilename"><i class="fas fa-file-type-pdf"></i> No file loaded</span>
    <span class="status-item" id="statusPages"></span>
    <span class="status-item" id="statusSession"></span>
    <span class="status-item" id="statusEncryption" style="display:none;"></span>
    <span class="status-item" id="statusLoading" style="display:none;">
        <span class="spinner-border spinner-border-sm" role="status"></span> Loading...
    </span>
    <span class="status-item ms-auto" id="statusRam" style="display:none;" title="JS heap memory in use"><i class="fas fa-memory"></i> <span id="statusRamValue"></span></span>
    <a class="status-item status-license-link" href="/license" title="Open licenses and notices">
        <i class="fas fa-scale"></i> Licenses
    </a>
    <span class="status-item status-design-btn" id="designPickerStatusBtn" title="Choose design theme" role="button" tabindex="0">
        <i class="fas fa-sliders"></i>
        <span class="design-status-label">Studio</span>
    </span>
    <span class="status-item status-theme-btn" id="themePickerStatusBtn" title="Choose color theme" role="button" tabindex="0">
        <i class="fas fa-palette"></i>
        <span class="theme-status-dot"></span>
    </span>
</div>
</body>
</html>
