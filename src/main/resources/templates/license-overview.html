<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Licenses - PDFalyzer Studio</title>
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/cyborg/bootstrap.min.css" />
    <link rel="stylesheet" th:href="@{/webjars/font-awesome/6.4.0/css/all.min.css}" />
    <link rel="stylesheet" th:href="@{/styles.css}" />
    <style>
        body {
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            overflow: auto;
        }
        .page-wrap {
            max-width: 1024px;
            margin: 28px auto;
            padding: 0 16px;
        }
        .license-nav {
            background: rgba(15, 52, 96, 0.95);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 14px;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .license-nav-title {
            font-weight: 700;
            color: var(--accent);
            margin: 0;
            font-size: 1.05rem;
        }
        .license-card {
            background: rgba(15, 52, 96, 0.92);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.35);
        }
        .license-card .card-header {
            border-bottom: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.12);
        }
        .license-card .card-header strong {
            color: var(--text);
        }
        .doc-link {
            text-decoration: none;
            color: var(--accent);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .doc-link:hover {
            color: #7fe6ff;
            text-decoration: underline;
        }
        .doc-path {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            font-size: 12px;
            color: var(--text-muted);
            word-break: break-all;
        }
        .table {
            margin: 0;
        }
        .table thead th {
            border-color: var(--border);
            color: var(--text-muted);
            font-weight: 600;
        }
        .table td {
            border-color: var(--border);
            vertical-align: middle;
        }
        .table-dark {
            --bs-table-bg: transparent;
            --bs-table-striped-bg: rgba(255, 255, 255, 0.02);
            --bs-table-hover-bg: rgba(0, 212, 255, 0.08);
            --bs-table-color: var(--text);
            --bs-table-border-color: var(--border);
        }
        .summary-text {
            color: var(--text-muted);
            font-size: 13px;
            margin-bottom: 14px;
        }
    </style>
</head>
<body>
<div class="page-wrap">
    <div class="license-nav">
        <h1 class="license-nav-title"><i class="fas fa-balance-scale me-2"></i>Licenses and Notices</h1>
        <a href="/" class="btn btn-outline-accent btn-sm"><i class="fas fa-arrow-left me-1"></i>Back to App</a>
    </div>
    <p class="summary-text">This page lists every bundled compliance document and links directly to the file in the packaged app.</p>

    <div class="card license-card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <strong>Bundled documents</strong>
            <span class="text-muted" th:text="${#lists.size(documents)} + ' files'"></span>
        </div>
        <div class="card-body p-0">
            <table class="table table-dark table-hover mb-0">
                <thead>
                <tr>
                    <th class="ps-3">Document</th>
                    <th>Path</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(documents)}">
                    <td colspan="2" class="ps-3 text-muted">No license documents found in bundled resources.</td>
                </tr>
                <tr th:each="doc : ${documents}">
                    <td class="ps-3">
                        <a class="doc-link" th:href="${doc.href}" target="_blank" rel="noopener">
                            <i class="fas fa-file-alt"></i>
                            <span th:text="${doc.displayPath}"></span>
                        </a>
                    </td>
                    <td><span class="doc-path" th:text="${doc.href}"></span></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
