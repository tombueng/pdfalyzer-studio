<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDFalyzer</title>
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/cyborg/bootstrap.min.css" />
    <link rel="stylesheet" th:href="@{/webjars/font-awesome/6.4.0/css/all.min.css}" />
    <link rel="stylesheet" th:href="@{/styles.css}" />
    <link rel="stylesheet" th:href="@{/styles-tree.css}" />
    <link rel="stylesheet" th:href="@{/styles-editor.css}" />
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="container-fluid d-flex align-items-center">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <img src="/logo.svg" alt="logo" width="28" height="28" class="me-2" />
                <span>PDFalyzer</span>
            </a>
            <div class="d-flex align-items-center gap-2">
                <input id="searchInput" type="text" class="form-control form-control-sm"
                       placeholder="Search tree..." disabled />
                <label class="btn btn-accent btn-sm mb-0" id="uploadBtn">
                    <i class="fas fa-upload me-1"></i> Upload PDF
                    <input type="file" id="fileInput" accept=".pdf" hidden />
                </label>
                <button class="btn btn-outline-accent btn-sm" id="downloadBtn" disabled title="Download PDF (Ctrl+S)">
                    <i class="fas fa-download"></i>
                </button>
                <button class="btn btn-outline-accent btn-sm" id="exportTreeBtn" disabled title="Export tree as JSON">
                    <i class="fas fa-file-export"></i>
                </button>
                <button class="btn btn-outline-accent btn-sm" id="zoomModeBtn" disabled title="Toggle auto zoom mode">
                    <i class="fas fa-expand-arrows-alt"></i>
                </button>
                <div id="editToolbar" class="d-flex align-items-center gap-1">
                    <span class="text-muted me-1" style="font-size:12px;">Add field:</span>
                    <button class="edit-field-btn" data-type="text"><i class="fas fa-keyboard me-1"></i>Text</button>
                    <button class="edit-field-btn" data-type="checkbox"><i class="fas fa-check-square me-1"></i>Checkbox</button>
                    <button class="edit-field-btn" data-type="combo"><i class="fas fa-list me-1"></i>Combo</button>
                    <button class="edit-field-btn" data-type="radio"><i class="fas fa-dot-circle me-1"></i>Radio</button>
                    <button class="edit-field-btn" data-type="signature"><i class="fas fa-signature me-1"></i>Signature</button>
                    <button class="btn btn-outline-accent btn-sm" id="formOptionsBtn" disabled title="Edit options for selected field(s)">
                        <i class="fas fa-sliders-h me-1"></i>Options
                    </button>
                    <button class="btn btn-outline-accent btn-sm" id="formSaveBtn" disabled title="Save pending form changes">
                        <i class="fas fa-save me-1"></i>Save
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div id="appContainer">
        <!-- PDF Viewer -->
        <div id="pdfPane">
            <div id="dropOverlay"><i class="fas fa-cloud-upload-alt me-2"></i> Drop PDF here</div>
            <div id="uploadSplash">
                <img src="/logo.svg" alt="PDFalyzer" />
                <p>Upload or drop a PDF to get started</p>
                <label class="btn btn-accent">
                    <i class="fas fa-file-pdf me-1"></i> Choose PDF
                    <input type="file" accept=".pdf" hidden
                           onchange="document.getElementById('fileInput').files = this.files;
                                     document.getElementById('fileInput').dispatchEvent(new Event('change'));" />
                </label>
            </div>
            <div id="pdfViewer" style="display:none;"></div>
        </div>

        <!-- Resize Divider -->
        <div id="divider"></div>

        <!-- Tree Panel -->
        <div id="treePane">
            <div class="tree-tabs">
                <button class="tab-btn active" data-tab="structure"><i class="fas fa-sitemap me-1"></i>Structure</button>
                <button class="tab-btn" data-tab="forms"><i class="fas fa-wpforms me-1"></i>Forms</button>
                <button class="tab-btn" data-tab="fonts"><i class="fas fa-font me-1"></i>Fonts</button>
                <button class="tab-btn" data-tab="validation"><i class="fas fa-check-circle me-1"></i>Validation</button>
                <button class="tab-btn" data-tab="rawcos"><i class="fas fa-database me-1"></i>Raw COS</button>
                <button class="tab-btn" data-tab="bookmarks"><i class="fas fa-bookmark me-1"></i>Bookmarks</button>
                <button class="tab-btn" data-tab="attachments"><i class="fas fa-paperclip me-1"></i>Attachments</button>
            </div>
            <div id="treeContent">
                <div class="text-muted text-center mt-5" style="font-size:13px;">
                    <i class="fas fa-arrow-left me-1"></i> Upload a PDF to inspect
                </div>
            </div>
        </div>
    </div>

    <!-- Status Bar -->
    <div id="statusBar">
        <span class="status-item" id="statusFilename"><i class="fas fa-file-pdf"></i> No file loaded</span>
        <span class="status-item" id="statusPages"></span>
        <span class="status-item" id="statusSession"></span>
        <span class="ms-auto status-item" id="statusLoading" style="display:none;">
            <span class="spinner-border spinner-border-sm" role="status"></span> Loading...
        </span>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer"></div>

    <!-- Resource preview modal -->
    <div class="modal fade" id="resourcePreviewModal" tabindex="-1" aria-labelledby="resourcePreviewLabel" aria-hidden="true">
      <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="resourcePreviewLabel">Resource Preview</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body" id="resourcePreviewBody">
            <!-- injected content -->
          </div>
        </div>
      </div>
    </div>

    <div class="modal fade" id="fieldCreateModal" tabindex="-1" aria-labelledby="fieldCreateLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="fieldCreateLabel">Add Field</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="row g-2">
                        <div class="col-6">
                            <label class="form-label form-label-sm">Type</label>
                            <input class="form-control form-control-sm" id="createFieldType" readonly />
                        </div>
                        <div class="col-6">
                            <label class="form-label form-label-sm">Page</label>
                            <input class="form-control form-control-sm" id="createFieldPage" readonly />
                        </div>
                        <div class="col-12">
                            <label class="form-label form-label-sm">Field ID</label>
                            <input class="form-control form-control-sm" id="createFieldId" placeholder="field_id" />
                        </div>
                        <div class="col-12">
                            <label class="form-label form-label-sm">Options JSON</label>
                            <textarea class="form-control form-control-sm" id="createFieldOptions" rows="6"></textarea>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-accent btn-sm" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-accent btn-sm" id="applyCreateFieldBtn">Queue Field</button>
                </div>
            </div>
        </div>
    </div>

        <div class="modal fade" id="fieldOptionsModal" tabindex="-1" aria-labelledby="fieldOptionsLabel" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="fieldOptionsLabel">Field Options</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-2 text-muted" id="fieldOptionsSelectionInfo" style="font-size:12px;"></div>
                        <div class="row g-2">
                            <div class="col-6">
                                <label class="form-label form-label-sm">Required</label>
                                <select class="form-select form-select-sm" id="optRequired">
                                    <option value="keep">(keep/mixed)</option>
                                    <option value="true">true</option>
                                    <option value="false">false</option>
                                </select>
                            </div>
                            <div class="col-6">
                                <label class="form-label form-label-sm">ReadOnly</label>
                                <select class="form-select form-select-sm" id="optReadonly">
                                    <option value="keep">(keep/mixed)</option>
                                    <option value="true">true</option>
                                    <option value="false">false</option>
                                </select>
                            </div>
                            <div class="col-6">
                                <label class="form-label form-label-sm">Multiline</label>
                                <select class="form-select form-select-sm" id="optMultiline">
                                    <option value="keep">(keep/mixed)</option>
                                    <option value="true">true</option>
                                    <option value="false">false</option>
                                </select>
                            </div>
                            <div class="col-6">
                                <label class="form-label form-label-sm">Editable (combo)</label>
                                <select class="form-select form-select-sm" id="optEditable">
                                    <option value="keep">(keep/mixed)</option>
                                    <option value="true">true</option>
                                    <option value="false">false</option>
                                </select>
                            </div>
                            <div class="col-6">
                                <label class="form-label form-label-sm">Checked (checkbox)</label>
                                <select class="form-select form-select-sm" id="optChecked">
                                    <option value="keep">(keep/mixed)</option>
                                    <option value="true">true</option>
                                    <option value="false">false</option>
                                </select>
                            </div>
                            <div class="col-12">
                                <label class="form-label form-label-sm">Default value (single-select)</label>
                                <input class="form-control form-control-sm" id="optDefaultValue" placeholder="leave empty to keep" />
                            </div>
                            <div class="col-12">
                                <label class="form-label form-label-sm">Choices comma-separated (single combo/list)</label>
                                <input class="form-control form-control-sm" id="optChoices" placeholder="A,B,C" />
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-outline-accent btn-sm" data-bs-dismiss="modal">Cancel</button>
                        <button type="button" class="btn btn-accent btn-sm" id="applyFieldOptionsBtn">Apply</button>
                    </div>
                </div>
            </div>
        </div>

    <!-- pdf.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script th:src="@{/webjars/jquery/3.7.1/jquery.min.js}"></script>
    <script th:src="@{/webjars/bootstrap/5.3.0/js/bootstrap.bundle.min.js}"></script>
    <!-- PDFalyzer modules (order matters: state must be first) -->
    <script th:src="@{/js/app-state.js}"></script>
    <script th:src="@{/js/app-utils.js}"></script>
    <script th:src="@{/js/app-resource.js}"></script>
    <script th:src="@{/js/app-dict-editor.js}"></script>
    <script th:src="@{/js/app-cos-editor.js}"></script>
    <script th:src="@{/js/app-tree.js}"></script>
    <script th:src="@{/js/app-viewer.js}"></script>
    <script th:src="@{/js/app-search.js}"></script>
    <script th:src="@{/js/app-tabs.js}"></script>
    <script th:src="@{/js/app-edit-mode.js}"></script>
    <script th:src="@{/js/app-upload.js}"></script>
    <script th:src="@{/js/app-zoom.js}"></script>
    <script th:src="@{/js/app-divider.js}"></script>
    <script th:src="@{/js/app-keyboard.js}"></script>
    <script th:src="@{/js/app-export.js}"></script>
    <script th:src="@{/app.js}"></script>
</body>
</html>
