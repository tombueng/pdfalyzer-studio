<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDFalyzer Studio</title>
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <!-- Apply saved theme before CSS renders to prevent flash -->
    <script>(function(){var t=localStorage.getItem('pdfalyzer-theme');if(t&&t!=='void-blue')document.documentElement.setAttribute('data-theme',t);})();</script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/cyborg/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" />
    <link rel="stylesheet" th:href="@{/colors.css}" />
    <link rel="stylesheet" th:href="@{/styles.css}" />
    <link rel="stylesheet" th:href="@{/styles-tree.css}" />
    <link rel="stylesheet" th:href="@{/styles-fonts.css}" />
    <link rel="stylesheet" th:href="@{/styles-glyph.css}" />
    <link rel="stylesheet" th:href="@{/styles-editor.css}" />
    <link rel="stylesheet" th:href="@{/styles-common.css}" />
</head>
<body>
    <th:block th:replace="~{fragments/navbar :: navbar}"></th:block>
    <th:block th:replace="~{fragments/main-content :: main-content}"></th:block>
    <th:block th:replace="~{fragments/status-bar :: status-bar}"></th:block>
    <div id="toastContainer"></div>
    <th:block th:replace="~{fragments/modals :: modals}"></th:block>
    <th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>
</html>
