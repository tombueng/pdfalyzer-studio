# Spring Boot configuration for PDFalyzer Studio

# server
server.port=${PORT:8080}

# thymeleaf
spring.thymeleaf.cache=false

# multipart upload limits
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# session
server.servlet.session.timeout=300m

# logging
logging.level.root=INFO
logging.level.io.pdfalyzer=DEBUG
logging.level.io.pdfalyzer.client-errors=INFO

# suppress noisy third-party libraries
logging.level.org.apache.pdfbox=ERROR
logging.level.org.apache.fontbox=ERROR
logging.level.org.verapdf=ERROR

# TSA (Time Stamp Authority) configuration
pdfalyzer.tsa.probe-timeout-ms=8000
pdfalyzer.tsa.request-timeout-ms=15000

# Trust list configuration (EUTL / AATL)
pdfalyzer.trust.eutl.lotl-url=https://ec.europa.eu/tools/lotl/eu-lotl.xml
pdfalyzer.trust.eutl.cache-ttl-minutes=360
pdfalyzer.trust.aatl.url=https://trustlist.adobe.com/tl12.acrobatsecuritysettings
pdfalyzer.trust.aatl.cache-ttl-minutes=1440
pdfalyzer.trust.download-timeout-ms=15000
pdfalyzer.trust.ocsp-timeout-ms=10000
pdfalyzer.trust.crl-timeout-ms=15000
pdfalyzer.trust.enable-online-revocation=true

# CSC (Cloud Signature Consortium) remote signing configuration
pdfalyzer.csc.connect-timeout-ms=10000
pdfalyzer.csc.read-timeout-ms=30000
